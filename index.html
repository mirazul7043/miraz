<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Inventory Management</title>

<style>
body {font-family: Arial; margin:0; background:#f2f4f8;}
header {background:#1f2a40; color:white; padding:15px; text-align:center;}

.container {width:90%; max-width:900px; margin:auto; padding:20px;}

.card {background:white; padding:15px; margin-top:15px; border-radius:8px;}

input {width:100%; padding:10px; margin:5px 0;}

button {padding:10px; width:100%; border:none; background:#2ecc71; color:white; cursor:pointer;}

button:hover {background:#27ae60;}

table {width:100%; border-collapse:collapse; margin-top:10px;}

th,td {border:1px solid #ddd; padding:8px; text-align:center;}

th {background:#34495e; color:white;}

.hidden {display:none;}

.logout {background:red;}
</style>
</head>

<body>

<header>
<h2>ইনভেন্টরি ম্যানেজমেন্ট সিস্টেম</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>লগইন</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="panel" class="hidden">

<div class="card">
<h3>নতুন প্রোডাক্ট</h3>
<input id="pname" placeholder="Product Name">
<input id="pqty" type="number" placeholder="Quantity">
<button onclick="addItem()">Add Product</button>
</div>

<div class="card">
<h3>স্টক লিস্ট</h3>
<table>
<thead>
<tr>
<th>নাম</th>
<th>পরিমাণ</th>
<th>Action</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("stock")) || [];

/* LOGIN */
function login(){
let u = user.value;
let p = pass.value;

if(u=="admin" && p=="1234"){
loginBox.classList.add("hidden");
panel.classList.remove("hidden");
render();
}
else alert("ভুল username/password");
}

/* LOGOUT */
function logout(){
location.reload();
}

/* ADD PRODUCT */
function addItem(){
let name = pname.value;
let qty = pqty.value;

if(!name || !qty) return alert("সব ফিল্ড পূরণ করুন");

data.push({name, qty});
localStorage.setItem("stock", JSON.stringify(data));

pname.value="";
pqty.value="";
render();
}

/* DELETE */
function del(i){
data.splice(i,1);
localStorage.setItem("stock", JSON.stringify(data));
render();
}

/* RENDER */
function render(){
list.innerHTML="";

data.forEach((d,i)=>{
list.innerHTML += `
<tr>
<td>${d.name}</td>
<td>${d.qty}</td>
<td><button style="background:red" onclick="del(${i})">Delete</button></td>
</tr>
`;
});
}

render();
</script>

</body>
</html>
