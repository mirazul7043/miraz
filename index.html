<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ইনভেন্টরি ম্যানেজমেন্ট সিস্টেম</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      width: 90%;
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
    }
    button {
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #219150;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #34495e;
      color: white;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h2>ইনভেন্টরি ম্যানেজমেন্ট সিস্টেম (GitHub Pages)</h2>
</header>

<div class="container">

  <!-- Login Section -->
  <div id="loginBox" class="card">
    <h3>লগইন</h3>
    <input type="text" id="username" placeholder="ইউজারনেম" />
    <input type="password" id="password" placeholder="পাসওয়ার্ড" />
    <button onclick="login()">লগইন</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">

    <div class="card">
      <h3>নতুন প্রোডাক্ট যোগ করুন</h3>
      <input type="text" id="pname" placeholder="প্রোডাক্ট নাম" />
      <input type="number" id="pqty" placeholder="পরিমাণ" />
      <button onclick="addProduct()">যোগ করুন</button>
    </div>

    <div class="card">
      <h3>স্টক লিস্ট</h3>
      <table>
        <thead>
          <tr>
            <th>নাম</th>
            <th>পরিমাণ</th>
            <th>অ্যাকশন</th>
          </tr>
        </thead>
        <tbody id="productList"></tbody>
      </table>
    </div>

    <button style="background:red" onclick="logout()">লগআউট</button>

  </div>

</div>

<script>
  let products = JSON.parse(localStorage.getItem("products")) || [];

  window.login = function () {
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if (u === "admin" && p === "1234") {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    render();
  } else {
    alert("ভুল ইউজারনেম বা পাসওয়ার্ড!");
  }
};

  function logout() {
    location.reload();
  }

  function addProduct() {
    let name = document.getElementById("pname").value;
    let qty = document.getElementById("pqty").value;

    if (!name || !qty) return alert("সব তথ্য দিন");

    products.push({ name, qty });
    localStorage.setItem("products", JSON.stringify(products));

    document.getElementById("pname").value = "";
